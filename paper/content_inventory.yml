    detailed_status_home:
      - particle claim-tier tables
      - exact-output and execution-boundary sections
    avoid_repeating:
      - full recovered-core proof ledger
      - screen-microphysics packet construction

  reality_as_consensus_protocol:
    role: fixed-cutoff consensus and quotient-normal-form theorem surface
