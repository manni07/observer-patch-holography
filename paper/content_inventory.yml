# OPH paper content inventory.
# Purpose: keep each paper's role explicit so synthesis text does not repeat
# detailed claim tables or sector details carried by companion papers.

papers:
  observers_are_all_you_need:
    role: synthesis and reader entrypoint
    lead_material:
      - informal OPH picture
      - five axioms in words
      - pixel ratio P and calibrated capacity N_scr with N_patch distinction
      - lane-level result map
    detailed_status_home:
      - late cross-lane theorem boundary
      - embedded recovered-core classification section
    avoid_repeating:
      - full per-sector particle tables
      - full compact-paper dependency DAG
      - microphysics packet-level engineering details

  recovering_relativity_and_standard_model_structure_from_observer_overlap_consistency_compact:
    role: compact recovered-core theorem surface
    lead_material:
      - recovered-core axioms and premises
      - Lorentz, Einstein, and Standard Model dependency ledger
    detailed_status_home:
      - compact dependency tables
    avoid_repeating:
      - full synthesis lane inventory
      - detailed particle continuation numerics

  deriving_the_particle_zoo_from_observer_consistency:
