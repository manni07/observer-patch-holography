style_policy:
  front_matter:
    - lead with theory content before ledgers
    - use status tables late in synthesis papers
    - cite companion papers for sector detail
  prose:
    - avoid em dash scaffolding
    - avoid stock transition phrases
    - avoid formulaic contrast templates
    - state research state directly, with "work in progress" only for unfinished derivation lanes
