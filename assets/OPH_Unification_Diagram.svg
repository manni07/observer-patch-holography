<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 700" width="720" height="700">
  <defs>
    <marker id="uni-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="hsl(45,90%,55%)" />
    </marker>
    <marker id="uni-arrow-cyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="hsl(185,80%,55%)" />
    </marker>
    <marker id="uni-arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="hsl(140,60%,55%)" />
    </marker>
    <linearGradient id="uni-root-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="hsl(45,90%,25%)" />
      <stop offset="100%" stop-color="hsl(35,85%,18%)" />
    </linearGradient>
    <linearGradient id="uni-gravity-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="hsl(185,70%,15%)" />
      <stop offset="100%" stop-color="hsl(185,60%,10%)" />
    </linearGradient>
    <linearGradient id="uni-particle-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="hsl(140,50%,15%)" />
      <stop offset="100%" stop-color="hsl(140,40%,10%)" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="700" fill="hsl(220,20%,7%)" rx="12" />

  <!-- ROOT: Pixel Constant P -->
  <rect x="200" y="12" width="320" height="80" rx="12" fill="url(#uni-root-grad)" stroke="hsl(45,90%,55%)" stroke-width="2" />
  <text x="360" y="36" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="hsl(45,90%,75%)">PIXEL CONSTANT</text>
  <text x="360" y="56" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="hsl(45,95%,85%)">P = 1.63094</text>
  <text x="360" y="72" text-anchor="middle" font-family="monospace" font-size="9" fill="hsl(45,60%,60%)">dimensionless · pixel area measured</text>
  <text x="360" y="84" text-anchor="middle" font-family="monospace" font-size="9" fill="hsl(45,60%,60%)">in Planck units (a_cell / ℓ²_P)</text>

  <!-- COMMON DERIVATION CHAIN -->
  <line x1="360" y1="92" x2="360" y2="110" stroke="hsl(45,90%,55%)" stroke-width="2" marker-end="url(#uni-arrow)" />
  <rect x="195" y="110" width="330" height="62" rx="8" fill="hsl(220,20%,12%)" stroke="hsl(45,60%,40%)" stroke-width="1.2" />
  <text x="360" y="130" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="hsl(45,80%,70%)">COMMON DERIVATION CHAIN</text>
  <text x="360" y="145" text-anchor="middle" font-family="monospace" font-size="8" fill="hsl(220,15%,65%)">P fixes the unified coupling α_U, which sets the</text>
  <text x="360" y="157" text-anchor="middle" font-family="monospace" font-size="8" fill="hsl(220,15%,65%)">electroweak scale v = 246.8 GeV and the cell area a_cell</text>

  <!-- BRANCHING LINES -->
  <line x1="360" y1="172" x2="360" y2="200" stroke="hsl(45,60%,40%)" stroke-width="1.5" />
  <path d="M360,200 L180,200 L180,235" stroke="hsl(185,80%,55%)" stroke-width="2" fill="none" marker-end="url(#uni-arrow-cyan)" />
  <path d="M360,200 L540,200 L540,235" stroke="hsl(140,60%,55%)" stroke-width="2" fill="none" marker-end="url(#uni-arrow-green)" />

  <!-- BRANCHING NODE -->
  <rect x="285" y="191" width="150" height="20" rx="10" fill="hsl(220,20%,12%)" stroke="hsl(45,60%,45%)" stroke-width="1" />
  <text x="360" y="205" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="hsl(45,80%,70%)">EDGE ENTROPY = P / 4</text>

  <!-- LEFT COLUMN: GRAVITY BRANCH -->
  <rect x="50" y="235" width="260" height="38" rx="8" fill="url(#uni-gravity-grad)" stroke="hsl(185,80%,55%)" stroke-width="1.5" />
  <text x="180" y="252" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="hsl(185,80%,80%)">GRAVITY BRANCH</text>
  <text x="180" y="266" text-anchor="middle" font-family="monospace" font-size="8" fill="hsl(185,50%,60%)">Edge-entropy bridge → Newton matching</text>

  <line x1="180" y1="273" x2="180" y2="295" stroke="hsl(185,80%,55%)" stroke-width="1.5" marker-end="url(#uni-arrow-cyan)" />
  <rect x="68" y="295" width="224" height="36" rx="6" fill="hsl(220,20%,10%)" stroke="hsl(185,40%,35%)" stroke-width="1" />
  <text x="180" y="312" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="hsl(185,60%,70%)">ℓ̄_shared = P / 4 = 0.4077</text>
  <text x="180" y="324" text-anchor="middle" font-family="monospace" font-size="8" fill="hsl(220,15%,55%)">boundary information density per edge</text>

  <line x1="180" y1="331" x2="180" y2="353" stroke="hsl(185,80%,55%)" stroke-width="1.5" marker-end="url(#uni-arrow-cyan)" />
  <rect x="68" y="353" width="224" height="36" rx="6" fill="hsl(220,20%,10%)" stroke="hsl(185,40%,35%)" stroke-width="1" />
  <text x="180" y="369" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="hsl(185,60%,70%)">G_nat = a_cell / P ≈ 0.6131</text>
  <text x="180" y="382" text-anchor="middle" font-family="monospace" font-size="8" fill="hsl(220,15%,55%)">gravitational coupling in Planck units</text>

  <line x1="180" y1="389" x2="180" y2="411" stroke="hsl(185,80%,55%)" stroke-width="1.5" marker-end="url(#uni-arrow-cyan)" />
  <rect x="38" y="411" width="284" height="54" rx="8" fill="hsl(185,70%,12%)" stroke="hsl(185,80%,55%)" stroke-width="2" />
  <text x="180" y="430" text-anchor="middle" font-family="monospace" font-size="9" fill="hsl(185,50%,65%)">Newton's Gravitational Constant</text>
  <text x="180" y="450" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="hsl(185,95%,85%)">G = 6.6743 × 10⁻¹¹ m³kg⁻¹s⁻²</text>

  <line x1="180" y1="465" x2="180" y2="484" stroke="hsl(185,50%,40%)" stroke-width="1" stroke-dasharray="4,3" />
  <rect x="68" y="484" width="224" height="40" rx="5" fill="hsl(220,20%,9%)" stroke="hsl(185,30%,30%)" stroke-width="0.8" />
  <text x="180" y="499" text-anchor="middle" font-family="monospace" font-size="8" fill="hsl(185,40%,55%)">Planck length: ℓ_P = 1.616 × 10⁻³⁵ m</text>
  <text x="180" y="514" text-anchor="middle" font-family="monospace" font-size="8" fill="hsl(185,40%,55%)">Planck mass: M_P = 1.221 × 10¹⁹ GeV</text>

  <!-- RIGHT COLUMN: PARTICLE BRANCH -->
  <rect x="410" y="235" width="260" height="38" rx="8" fill="url(#uni-particle-grad)" stroke="hsl(140,60%,55%)" stroke-width="1.5" />
  <text x="540" y="252" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="hsl(140,70%,80%)">PARTICLE BRANCH</text>
  <text x="540" y="266" text-anchor="middle" font-family="monospace" font-size="8" fill="hsl(140,40%,55%)">Gauge consistency → exact mass spectrum</text>

  <line x1="540" y1="273" x2="540" y2="295" stroke="hsl(140,60%,55%)" stroke-width="1.5" marker-end="url(#uni-arrow-green)" />
  <rect x="420" y="295" width="240" height="36" rx="6" fill="hsl(220,20%,10%)" stroke="hsl(140,35%,35%)" stroke-width="1" />
  <text x="540" y="312" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="hsl(140,55%,65%)">Electroweak Calibration</text>
  <text x="540" y="324" text-anchor="middle" font-family="monospace" font-size="8" fill="hsl(220,15%,55%)">coupling runs from α_U to electroweak scale</text>

  <line x1="540" y1="331" x2="540" y2="353" stroke="hsl(140,60%,55%)" stroke-width="1.5" marker-end="url(#uni-arrow-green)" />
  <rect x="415" y="353" width="250" height="56" rx="8" fill="hsl(140,50%,12%)" stroke="hsl(140,60%,55%)" stroke-width="2" />
  <text x="540" y="371" text-anchor="middle" font-family="monospace" font-size="9" fill="hsl(140,40%,60%)">W Boson and Z Boson masses</text>
  <text x="540" y="387" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="hsl(140,80%,82%)">W Boson: 80.377 GeV</text>
  <text x="540" y="403" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="hsl(140,80%,82%)">Z Boson: 91.188 GeV</text>

  <line x1="540" y1="409" x2="540" y2="428" stroke="hsl(140,60%,55%)" stroke-width="1.5" marker-end="url(#uni-arrow-green)" />
  <rect x="415" y="428" width="250" height="56" rx="8" fill="hsl(140,50%,12%)" stroke="hsl(140,60%,55%)" stroke-width="2" />
  <text x="540" y="446" text-anchor="middle" font-family="monospace" font-size="9" fill="hsl(140,40%,60%)">Higgs and Top Quark masses</text>
  <text x="540" y="462" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="hsl(140,80%,82%)">Higgs Boson: 125.20 GeV</text>
  <text x="540" y="478" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="hsl(140,80%,82%)">Top Quark: 172.35 GeV</text>

  <line x1="540" y1="484" x2="540" y2="503" stroke="hsl(140,40%,40%)" stroke-width="1" stroke-dasharray="4,3" />
  <rect x="420" y="503" width="240" height="28" rx="5" fill="hsl(220,20%,9%)" stroke="hsl(140,30%,30%)" stroke-width="0.8" />
  <text x="540" y="521" text-anchor="middle" font-family="monospace" font-size="8" fill="hsl(140,40%,55%)">remaining quarks · leptons · neutrinos</text>

  <!-- STRUCTURAL INVARIANTS -->
  <line x1="360" y1="200" x2="360" y2="555" stroke="hsl(220,15%,25%)" stroke-width="1" stroke-dasharray="3,4" />
  <rect x="170" y="555" width="380" height="90" rx="8" fill="hsl(220,20%,10%)" stroke="hsl(260,40%,45%)" stroke-width="1.5" />
  <text x="360" y="573" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="hsl(260,50%,80%)">STRUCTURAL INVARIANTS</text>
  <text x="360" y="588" text-anchor="middle" font-family="monospace" font-size="9" fill="hsl(260,30%,60%)">from Lorentz symmetry of the observer sphere</text>
  <text x="360" y="605" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="hsl(260,40%,85%)">Speed of Light: c = 299,792,458 m/s</text>
  <text x="360" y="622" text-anchor="middle" font-family="monospace" font-size="9" fill="hsl(260,30%,60%)">Structurally massless carriers:</text>
  <text x="360" y="638" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="hsl(260,40%,85%)">Photon · Gluon · Graviton → mass = 0</text>

  <!-- BOTTOM BANNER -->
  <rect x="60" y="660" width="600" height="22" rx="6" fill="hsl(45,80%,12%)" stroke="hsl(45,70%,40%)" stroke-width="1" />
  <text x="360" y="675" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="hsl(45,90%,75%)">ONE INPUT (P) → GRAVITY + PARTICLE MASSES + STRUCTURAL CONSTANTS</text>
</svg>
