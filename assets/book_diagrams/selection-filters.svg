<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">Selection filters for public law</title>
  <desc id="desc">Candidate patterns pass through filters for consistency, record stability, compressibility, and observer support.</desc>
  <rect width="960" height="500" fill="#f6f7f1"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2e2a25"/>
    </marker>
  </defs>
  <g stroke="#2e2a25" stroke-width="3" fill="#fffaf0">
    <rect x="80" y="118" width="150" height="82" rx="10"/>
    <rect x="292" y="118" width="150" height="82" rx="10"/>
    <rect x="504" y="118" width="150" height="82" rx="10"/>
    <rect x="716" y="118" width="150" height="82" rx="10"/>
  </g>
  <g font-family="Arial, sans-serif" fill="#2e2a25" font-size="20" font-weight="700" text-anchor="middle">
    <text x="155" y="153">overlap</text>
    <text x="155" y="179">consistency</text>
    <text x="367" y="153">stable</text>
    <text x="367" y="179">records</text>
    <text x="579" y="153">compressible</text>
    <text x="579" y="179">laws</text>
    <text x="791" y="153">observer</text>
    <text x="791" y="179">support</text>
  </g>
  <g stroke="#2e2a25" stroke-width="5" marker-end="url(#arrow)">
    <path d="M238 159 H277"/>
    <path d="M450 159 H489"/>
    <path d="M662 159 H701"/>
  </g>
  <path d="M110 315 C230 250 310 380 430 315 S630 250 840 315" fill="none" stroke="#c85b43" stroke-width="7" stroke-linecap="round"/>
  <path d="M110 360 C230 295 310 425 430 360 S630 295 840 360" fill="none" stroke="#68a691" stroke-width="7" stroke-linecap="round"/>
  <text x="480" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" fill="#2e2a25">what survives the filters becomes public physics</text>
</svg>
