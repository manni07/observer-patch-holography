<svg xmlns="http://www.w3.org/2000/svg" width="960" height="470" viewBox="0 0 960 470" role="img" aria-labelledby="title desc">
  <title id="title">Noether bridge from symmetry to conservation</title>
  <desc id="desc">A transformation that leaves the action unchanged produces a conserved current.</desc>
  <rect width="960" height="470" fill="#f6f4ec"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2e2a25"/>
    </marker>
  </defs>
  <g fill="#fffaf0" stroke="#2e2a25" stroke-width="3">
    <rect x="78" y="126" width="225" height="150" rx="10"/>
    <rect x="368" y="126" width="225" height="150" rx="10"/>
    <rect x="658" y="126" width="225" height="150" rx="10"/>
  </g>
  <g font-family="Arial, sans-serif" fill="#2e2a25" text-anchor="middle">
    <text x="190" y="185" font-size="27" font-weight="700">symmetry</text>
    <text x="190" y="224" font-size="20">allowed change</text>
    <text x="480" y="185" font-size="27" font-weight="700">action fixed</text>
    <text x="480" y="224" font-size="20">no observable cost</text>
    <text x="770" y="185" font-size="27" font-weight="700">current conserved</text>
    <text x="770" y="224" font-size="20">flow balances</text>
  </g>
  <path d="M316 201 H350" stroke="#2e2a25" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M606 201 H640" stroke="#2e2a25" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M206 332 C332 392 628 392 754 332" fill="none" stroke="#405d73" stroke-width="7" stroke-linecap="round"/>
  <text x="480" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" fill="#2e2a25">same description after a transformation means something is preserved</text>
</svg>
