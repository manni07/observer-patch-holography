<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">de Sitter static patch and horizon capacity</title>
  <desc id="desc">An observer at the center of a de Sitter static patch is bounded by a finite horizon screen.</desc>
  <rect width="960" height="500" fill="#f6f7f1"/>
  <circle cx="480" cy="250" r="180" fill="#fffaf0" stroke="#2e2a25" stroke-width="4"/>
  <circle cx="480" cy="250" r="22" fill="#c85b43" stroke="#2e2a25" stroke-width="3"/>
  <path d="M480 250 L660 250" stroke="#405d73" stroke-width="6" stroke-linecap="round"/>
  <path d="M300 250 A180 180 0 0 1 660 250" fill="none" stroke="#68a691" stroke-width="8" stroke-linecap="round"/>
  <g font-family="Arial, sans-serif" fill="#2e2a25" font-weight="700">
    <text x="402" y="244" font-size="23">observer</text>
    <text x="535" y="236" font-size="23">r_dS</text>
    <text x="344" y="78" font-size="27">finite horizon screen</text>
    <text x="302" y="452" font-size="23">capacity scales as horizon area</text>
  </g>
</svg>
