<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460" role="img" aria-labelledby="title desc">
  <title id="title">Entropy gradient and record formation</title>
  <desc id="desc">Low entropy resources feed record formation, while erased uncertainty exits as heat and higher entropy.</desc>
  <rect width="960" height="460" fill="#f6f7f2"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2e2a25"/>
    </marker>
  </defs>
  <g font-family="Arial, sans-serif" fill="#2e2a25">
    <text x="83" y="86" font-size="26" font-weight="700">low entropy resource</text>
    <text x="378" y="86" font-size="26" font-weight="700">observer record</text>
    <text x="680" y="86" font-size="26" font-weight="700">heat and waste</text>
  </g>
  <rect x="90" y="145" width="170" height="170" rx="10" fill="#fffaf0" stroke="#2e2a25" stroke-width="3"/>
  <g fill="#405d73">
    <circle cx="145" cy="200" r="12"/>
    <circle cx="205" cy="200" r="12"/>
    <circle cx="145" cy="260" r="12"/>
    <circle cx="205" cy="260" r="12"/>
  </g>
  <rect x="395" y="135" width="170" height="190" rx="10" fill="#fdf7df" stroke="#2e2a25" stroke-width="3"/>
  <path d="M425 185 H535 M425 230 H535 M425 275 H500" stroke="#405d73" stroke-width="10" stroke-linecap="round"/>
  <circle cx="725" cy="172" r="13" fill="#c85b43"/>
  <circle cx="796" cy="219" r="13" fill="#c85b43"/>
  <circle cx="689" cy="266" r="13" fill="#c85b43"/>
  <circle cx="838" cy="292" r="13" fill="#c85b43"/>
  <circle cx="756" cy="332" r="13" fill="#c85b43"/>
  <path d="M285 230 H365" stroke="#2e2a25" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M590 230 H670" stroke="#2e2a25" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="382" y="397" font-family="Arial, sans-serif" font-size="22" fill="#2e2a25">memory is paid for by an entropy gradient</text>
</svg>
