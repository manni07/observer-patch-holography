<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460" role="img" aria-labelledby="title desc">
  <title id="title">Measurement order in a noncommutative algebra</title>
  <desc id="desc">Two question orders, AB and BA, lead to different final states when observables do not commute.</desc>
  <rect width="960" height="460" fill="#f8f5ef"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2e2a25"/>
    </marker>
  </defs>
  <g font-family="Arial, sans-serif" fill="#2e2a25" font-weight="700">
    <text x="126" y="70" font-size="28">ask A then B</text>
    <text x="612" y="70" font-size="28">ask B then A</text>
  </g>
  <g fill="#fffaf0" stroke="#2e2a25" stroke-width="3">
    <rect x="86" y="148" width="110" height="80" rx="8"/>
    <rect x="270" y="148" width="110" height="80" rx="8"/>
    <rect x="454" y="148" width="110" height="80" rx="8"/>
    <rect x="580" y="148" width="110" height="80" rx="8"/>
    <rect x="764" y="148" width="110" height="80" rx="8"/>
  </g>
  <g font-family="Arial, sans-serif" fill="#2e2a25" font-size="34" font-weight="700" text-anchor="middle">
    <text x="141" y="199">state</text>
    <text x="325" y="199">A</text>
    <text x="509" y="199">B</text>
    <text x="635" y="199">B</text>
    <text x="819" y="199">A</text>
  </g>
  <g stroke="#2e2a25" stroke-width="5" fill="none" marker-end="url(#arrow)">
    <path d="M205 188 H255"/>
    <path d="M389 188 H439"/>
    <path d="M699 188 H749"/>
  </g>
  <path d="M504 270 C430 345 285 347 220 270" fill="none" stroke="#405d73" stroke-width="8" stroke-linecap="round"/>
  <path d="M820 270 C755 345 610 345 540 270" fill="none" stroke="#c85b43" stroke-width="8" stroke-linecap="round"/>
  <text x="366" y="398" font-family="Arial, sans-serif" font-size="25" fill="#2e2a25">AB and BA need not be the same physical question</text>
</svg>
