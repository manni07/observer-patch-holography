<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 560 280" class="w-full max-w-lg mx-auto" xmlns="http://www.w3.org/2000/svg"><defs><marker id="nb-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="hsl(45,90%,55%)"></path></marker></defs><text x="280" y="24" text-anchor="middle" fill="hsl(175,70%,50%)" font-family="monospace" font-size="13" font-weight="600">NULL BLOW-UP: CAP → LIGHT RAY</text><text x="130" y="52" text-anchor="middle" fill="hsl(210,20%,60%)" font-family="monospace" font-size="10">Cap on S²</text><circle cx="130" cy="150" r="80" fill="hsl(220,18%,12%)" stroke="hsl(220,15%,22%)" stroke-width="1"></circle><path d="M75,120 A80,80 0 0,1 185,120 A55,14 0 0,1 75,120 Z" fill="hsl(175,70%,50%)" fill-opacity="0.12" stroke="hsl(175,70%,50%)" stroke-width="1.2"></path><text x="130" y="100" text-anchor="middle" fill="hsl(175,80%,60%)" font-family="monospace" font-size="11">C</text><circle cx="185" cy="120" r="4" fill="hsl(45,90%,55%)" stroke="hsl(45,90%,55%)" stroke-width="1"></circle><text x="200" y="115" fill="hsl(45,90%,55%)" font-family="monospace" font-size="10" font-weight="600">p</text><line x1="230" y1="150" x2="310" y2="150" stroke="hsl(45,90%,55%)" stroke-width="2" marker-end="url(#nb-arrow)"></line><text x="270" y="140" text-anchor="middle" fill="hsl(45,70%,50%)" font-family="monospace" font-size="9">blow-up</text><text x="430" y="52" text-anchor="middle" fill="hsl(210,20%,60%)" font-family="monospace" font-size="10">Near point p (zoomed)</text><line x1="330" y1="150" x2="530" y2="150" stroke="hsl(175,70%,50%)" stroke-width="2"></line><circle cx="350" cy="150" r="3" fill="hsl(175,70%,50%)"></circle><text x="350" y="170" text-anchor="middle" fill="hsl(210,20%,55%)" font-family="monospace" font-size="9">0</text><circle cx="420" cy="150" r="3" fill="hsl(175,70%,50%)"></circle><text x="420" y="170" text-anchor="middle" fill="hsl(210,20%,55%)" font-family="monospace" font-size="9">a</text><circle cx="490" cy="150" r="3" fill="hsl(175,70%,50%)"></circle><text x="490" y="170" text-anchor="middle" fill="hsl(210,20%,55%)" font-family="monospace" font-size="9">2a</text><path d="M370,130 L400,130" fill="none" stroke="hsl(260,60%,55%)" stroke-width="1" marker-end="url(#nb-arrow)"></path><text x="385" y="124" text-anchor="middle" fill="hsl(260,50%,60%)" font-family="monospace" font-size="8">dilation</text><text x="430" y="200" text-anchor="middle" fill="hsl(45,70%,50%)" font-family="monospace" font-size="9">Conformal dilation → dilation along ray</text><text x="280" y="260" text-anchor="middle" fill="hsl(210,20%,55%)" font-family="sans-serif" font-size="10" font-style="italic">The curved boundary straightens into a null (light) ray</text></svg>