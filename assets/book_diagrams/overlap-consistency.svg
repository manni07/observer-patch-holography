<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 500 300" class="w-full max-w-md mx-auto" xmlns="http://www.w3.org/2000/svg"><defs><clipPath id="oc-clip-p1"><circle cx="190" cy="155" r="90"></circle></clipPath><clipPath id="oc-clip-p2"><circle cx="310" cy="155" r="90"></circle></clipPath></defs><text x="250" y="24" text-anchor="middle" fill="hsl(175,70%,50%)" font-family="monospace" font-size="13" font-weight="600">OVERLAP CONSISTENCY</text><circle cx="190" cy="155" r="90" fill="hsl(175,70%,50%)" fill-opacity="0.08" stroke="hsl(175,70%,50%)" stroke-width="1.2"></circle><text x="130" y="110" fill="hsl(175,80%,60%)" font-family="monospace" font-size="14" font-weight="600">P₁</text><circle cx="310" cy="155" r="90" fill="hsl(260,60%,55%)" fill-opacity="0.08" stroke="hsl(260,60%,55%)" stroke-width="1.2"></circle><text x="355" y="110" fill="hsl(260,60%,70%)" font-family="monospace" font-size="14" font-weight="600">P₂</text><g clip-path="url(#oc-clip-p1)"><circle cx="310" cy="155" r="90" fill="hsl(45,90%,55%)" fill-opacity="0.12" stroke="hsl(45,90%,55%)" stroke-width="1.5"></circle></g><text x="250" y="148" text-anchor="middle" fill="hsl(45,90%,60%)" font-family="monospace" font-size="22" font-weight="700">ω₁ = ω₂</text><text x="250" y="172" text-anchor="middle" fill="hsl(45,60%,50%)" font-family="monospace" font-size="10">on shared region</text><line x1="160" y1="200" x2="225" y2="175" stroke="hsl(175,70%,50%)" stroke-width="1" stroke-dasharray="3,3"></line><text x="155" y="218" fill="hsl(175,60%,50%)" font-family="monospace" font-size="9" text-anchor="middle">ω from P₁</text><line x1="340" y1="200" x2="275" y2="175" stroke="hsl(260,60%,55%)" stroke-width="1" stroke-dasharray="3,3"></line><text x="345" y="218" fill="hsl(260,50%,60%)" font-family="monospace" font-size="9" text-anchor="middle">ω from P₂</text><text x="250" y="280" text-anchor="middle" fill="hsl(210,20%,60%)" font-family="sans-serif" font-size="11" font-style="italic">Measurements in the overlap must agree</text></svg>