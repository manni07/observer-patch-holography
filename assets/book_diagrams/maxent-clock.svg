<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">Maximum entropy inference and modular clock</title>
  <desc id="desc">Constraints select a maximum entropy state, whose restricted algebra carries an internal modular flow.</desc>
  <rect width="960" height="500" fill="#f7f5ef"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2e2a25"/>
    </marker>
  </defs>
  <rect x="88" y="130" width="210" height="220" rx="10" fill="#fffaf0" stroke="#2e2a25" stroke-width="3"/>
  <g font-family="Arial, sans-serif" fill="#2e2a25" font-weight="700">
    <text x="126" y="180" font-size="25">known</text>
    <text x="126" y="212" font-size="25">constraints</text>
    <text x="390" y="80" font-size="26">choose least-biased state</text>
  </g>
  <path d="M330 240 H445" stroke="#2e2a25" stroke-width="5" marker-end="url(#arrow)"/>
  <circle cx="600" cy="240" r="112" fill="#fffaf0" stroke="#2e2a25" stroke-width="4"/>
  <circle cx="600" cy="240" r="8" fill="#2e2a25"/>
  <path d="M600 240 L600 155" stroke="#405d73" stroke-width="7" stroke-linecap="round"/>
  <path d="M600 240 L670 276" stroke="#c85b43" stroke-width="7" stroke-linecap="round"/>
  <path d="M520 240 A80 80 0 1 1 600 320" fill="none" stroke="#68a691" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="514" y="402" font-family="Arial, sans-serif" font-size="24" fill="#2e2a25">modular flow supplies an internal clock</text>
</svg>
