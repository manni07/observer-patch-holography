<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 500 400" class="w-full max-w-md mx-auto" xmlns="http://www.w3.org/2000/svg"><defs><marker id="nl-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="hsl(175,70%,50%)"></path></marker><marker id="nl-arrow-gold" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="hsl(45,90%,55%)"></path></marker></defs><text x="250" y="24" text-anchor="middle" fill="hsl(175,70%,50%)" font-family="monospace" font-size="13" font-weight="600">FROM EINSTEIN TO NEWTON</text><rect x="100" y="42" width="300" height="44" rx="8" fill="hsl(45,90%,55%)" fill-opacity="0.1" stroke="hsl(45,90%,55%)" stroke-width="1.5"></rect><text x="250" y="60" text-anchor="middle" fill="hsl(45,90%,60%)" font-family="monospace" font-size="10" font-weight="700">EINSTEIN&#x27;S EQUATION</text><text x="250" y="78" text-anchor="middle" fill="hsl(45,70%,50%)" font-family="monospace" font-size="11">Gₐᵦ + Λgₐᵦ = 8πG⟨Tₐᵦ⟩</text><line x1="250" y1="86" x2="250" y2="130" stroke="hsl(175,70%,50%)" stroke-width="1.5" marker-end="url(#nl-arrow)"></line><rect x="265" y="96" width="130" height="22" rx="4" fill="hsl(220,18%,12%)" stroke="hsl(220,15%,22%)" stroke-width="0.8"></rect><text x="330" y="111" text-anchor="middle" fill="hsl(215,15%,55%)" font-family="monospace" font-size="8">weak field, slow motion</text><rect x="120" y="134" width="260" height="40" rx="6" fill="hsl(260,60%,55%)" fill-opacity="0.08" stroke="hsl(260,60%,55%)" stroke-width="1"></rect><text x="250" y="150" text-anchor="middle" fill="hsl(260,60%,65%)" font-family="monospace" font-size="10" font-weight="600">POISSON&#x27;S EQUATION</text><text x="250" y="167" text-anchor="middle" fill="hsl(260,50%,55%)" font-family="monospace" font-size="11">∇²Φ = 4πGρ</text><line x1="250" y1="174" x2="250" y2="210" stroke="hsl(175,70%,50%)" stroke-width="1.5" marker-end="url(#nl-arrow)"></line><rect x="265" y="182" width="90" height="22" rx="4" fill="hsl(220,18%,12%)" stroke="hsl(220,15%,22%)" stroke-width="0.8"></rect><text x="310" y="197" text-anchor="middle" fill="hsl(215,15%,55%)" font-family="monospace" font-size="8">point mass</text><rect x="140" y="214" width="220" height="40" rx="6" fill="hsl(260,60%,55%)" fill-opacity="0.08" stroke="hsl(260,60%,55%)" stroke-width="1"></rect><text x="250" y="230" text-anchor="middle" fill="hsl(260,60%,65%)" font-family="monospace" font-size="10" font-weight="600">GRAVITATIONAL POTENTIAL</text><text x="250" y="247" text-anchor="middle" fill="hsl(260,50%,55%)" font-family="monospace" font-size="11">Φ = −GM/r</text><line x1="250" y1="254" x2="250" y2="290" stroke="hsl(175,70%,50%)" stroke-width="1.5" marker-end="url(#nl-arrow)"></line><rect x="265" y="262" width="90" height="22" rx="4" fill="hsl(220,18%,12%)" stroke="hsl(220,15%,22%)" stroke-width="0.8"></rect><text x="310" y="277" text-anchor="middle" fill="hsl(215,15%,55%)" font-family="monospace" font-size="8">F = −m∇Φ</text><rect x="100" y="294" width="300" height="44" rx="8" fill="hsl(150,60%,45%)" fill-opacity="0.12" stroke="hsl(150,60%,45%)" stroke-width="1.5"></rect><text x="250" y="312" text-anchor="middle" fill="hsl(150,60%,55%)" font-family="monospace" font-size="10" font-weight="700">NEWTON&#x27;S LAW</text><text x="250" y="330" text-anchor="middle" fill="hsl(150,50%,45%)" font-family="monospace" font-size="13" font-weight="600">F = −GMm/r²</text><rect x="20" y="280" width="70" height="28" rx="4" fill="hsl(220,18%,12%)" stroke="hsl(220,15%,22%)" stroke-width="0.8"></rect><text x="55" y="298" text-anchor="middle" fill="hsl(215,15%,55%)" font-family="monospace" font-size="8">Geodesic eq.</text><line x1="90" y1="294" x2="98" y2="310" stroke="hsl(150,60%,45%)" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#nl-arrow)"></line><text x="250" y="370" text-anchor="middle" fill="hsl(210,20%,50%)" font-family="sans-serif" font-size="10" font-style="italic">Each step is a well-defined limit of the previous one</text></svg>